<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a1a;border-radius:20px;">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="60%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0040ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0d1f40"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="250" cy="250" r="250" fill="url(#bgGrad)"/>

  <circle cx="250" cy="250" r="210" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="8 6">
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="30s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="250" r="195" fill="none" stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="4 10">
    <animateTransform attributeName="transform" type="rotate" from="360 250 250" to="0 250 250" dur="20s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#glow)">
    <circle cx="250" cy="60" r="5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="420" cy="160" r="4" fill="#00d4ff" opacity="0.6"/>
    <circle cx="430" cy="340" r="5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="250" cy="440" r="4" fill="#00d4ff" opacity="0.6"/>
    <circle cx="70" cy="340" r="5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="60" cy="160" r="4" fill="#00d4ff" opacity="0.6"/>
    <circle cx="350" cy="100" r="3" fill="#ffd700" opacity="0.8"/>
    <circle cx="400" cy="250" r="3" fill="#ffd700" opacity="0.8"/>
    <circle cx="350" cy="400" r="3" fill="#ffd700" opacity="0.8"/>
    <circle cx="150" cy="400" r="3" fill="#ffd700" opacity="0.8"/>
    <circle cx="100" cy="250" r="3" fill="#ffd700" opacity="0.8"/>
    <circle cx="150" cy="100" r="3" fill="#ffd700" opacity="0.8"/>
  </g>

  <g stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.2" fill="none">
    <line x1="250" y1="60" x2="420" y2="160"/>
    <line x1="420" y1="160" x2="430" y2="340"/>
    <line x1="430" y1="340" x2="250" y2="440"/>
    <line x1="250" y1="440" x2="70" y2="340"/>
    <line x1="70" y1="340" x2="60" y2="160"/>
    <line x1="60" y1="160" x2="250" y2="60"/>
    <line x1="250" y1="60" x2="430" y2="340"/>
    <line x1="420" y1="160" x2="70" y2="340"/>
    <line x1="250" y1="440" x2="250" y2="60"/>
  </g>
  <g stroke="#ffd700" stroke-width="0.6" stroke-opacity="0.2" fill="none">
    <line x1="350" y1="100" x2="400" y2="250"/>
    <line x1="400" y1="250" x2="350" y2="400"/>
    <line x1="350" y1="400" x2="150" y2="400"/>
    <line x1="150" y1="400" x2="100" y2="250"/>
    <line x1="100" y1="250" x2="150" y2="100"/>
    <line x1="150" y1="100" x2="350" y2="100"/>
  </g>

  <circle cx="250" cy="215" r="130" fill="url(#aiGlow)">
    <animate attributeName="r" values="120;135;120" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="250" cy="215" r="100" fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <g stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.35" fill="none">
    <ellipse cx="250" cy="215" rx="100" ry="30"/>
    <ellipse cx="250" cy="215" rx="100" ry="60"/>
    <line x1="250" y1="115" x2="250" y2="315"/>
    <ellipse cx="250" cy="215" rx="40" ry="100"/>
    <ellipse cx="250" cy="215" rx="70" ry="100"/>
  </g>

  <ellipse cx="250" cy="215" rx="100" ry="35" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#glow)" stroke="#00d4ff" stroke-width="1.2" fill="none" stroke-opacity="0.7">
    <path d="M210,180 L210,195 L225,195 L225,210 L240,210"/>
    <path d="M290,180 L290,195 L275,195 L275,210 L260,210"/>
    <path d="M210,250 L210,235 L225,235 L225,220 L240,220"/>
    <path d="M290,250 L290,235 L275,235 L275,220 L260,220"/>
    <circle cx="210" cy="180" r="3" fill="#00d4ff"/>
    <circle cx="290" cy="180" r="3" fill="#00d4ff"/>
    <circle cx="210" cy="250" r="3" fill="#00d4ff"/>
    <circle cx="290" cy="250" r="3" fill="#00d4ff"/>
  </g>

  <circle cx="250" cy="215" r="22" fill="url(#coreGlow)" filter="url(#softGlow)">
    <animate attributeName="r" values="20;24;20" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="215" r="14" fill="#001830" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="250" y="221" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="13" fill="#00d4ff" filter="url(#glow)">AI</text>

  <g filter="url(#goldGlow)">
    <path d="M155,285 Q200,185 315,135" stroke="url(#goldGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <polygon points="315,135 300,143 323,153" fill="url(#goldGrad)"/>
  </g>

  <path d="M250,300 L220,283 L220,263 Q235,273 250,273 Q265,273 280,263 L280,283 Z" fill="url(#goldGrad)" opacity="0.9"/>
  <path d="M250,290 C250,290 243,283 243,279 C243,276 246,274 249,276 L250,278 L251,276 C254,274 257,276 257,279 C257,283 250,290 250,290Z" fill="#0d1b3e"/>

  <text x="250" y="365" text-anchor="middle" font-family="'Arial Black', Arial" font-weight="900" font-size="38" letter-spacing="6" fill="url(#goldGrad)" filter="url(#goldGlow)">FINOVAS</text>

  <rect x="100" y="372" width="55" height="1.5" fill="url(#goldGrad)" opacity="0.6"/>
  <rect x="345" y="372" width="55" height="1.5" fill="url(#goldGrad)" opacity="0.6"/>

  <text x="250" y="392" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" letter-spacing="8" fill="#00d4ff" filter="url(#glow)">CARE</text>

  <text x="250" y="418" text-anchor="middle" font-family="Arial" font-size="11" letter-spacing="1" fill="#ffd700" opacity="0.75">ดูแลด้วยใจ · ใส่ใจทุกธุรกิจ</text>

  <rect x="168" y="432" width="164" height="22" rx="11" fill="#001040" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="250" y="447" text-anchor="middle" font-family="Arial" font-size="10" letter-spacing="3" fill="#00d4ff" font-weight="bold">AI POWERED</text>

  <g fill="#ffd700">
    <circle cx="130" cy="200" r="2" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="150" r="2" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="385" cy="285" r="1.5" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="115" cy="305" r="1.5" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="130" r="2" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>
